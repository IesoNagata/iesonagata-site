<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../content/themes/google/favicon.png" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <title>Tags - Ieso Nagata</title>
</head>
<body>

<div id="page" class="site">
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="header-logo"><div class="header-logo-icon">IN</div><span class="site-title">Ieso Nagata</span></a>
            <div class="search-box">
                <form role="search" method="get" action="/">
                    <span class="search-icon">&#128269;</span>
                    <input type="search" name="s" placeholder="Pesquisar por ...">
                </form>
            </div>
            <nav class="main-navigation">
                <ul>
                    <li><a href="/">Início</a></li>
                    <li><a href="/about/">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="sidebar sidebar-left" id="sidebar-left"></div>

        <div class="main-content page-content">
            <div class="trending-section" style="margin-bottom:1.5rem;">
                <h1 class="page-title" id="tag-title">Tag</h1>
                <div class="posts-grid" id="tag-posts">
                    <p style="color:var(--text-muted);">Carregando postagens...</p>
                </div>
            </div>
        </div>

        <div class="sidebar sidebar-right" id="sidebar-right"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; 2026 Ieso Nagata. Todos os direitos reservados.</p>
        </div>
    </footer>
</div>

<script>
(function(){
var params=new URLSearchParams(window.location.search);
var tag=params.get("tag")||"";
var tagTitle=document.getElementById("tag-title");
var tagPosts=document.getElementById("tag-posts");
if(tagTitle)tagTitle.textContent="Tag: "+tag;
fetch("../js/posts.json")
.then(function(r){return r.json()})
.then(function(posts){
var filtered=posts.filter(function(p){return p.tags.map(function(t){return t.toLowerCase()}).indexOf(tag.toLowerCase())!==-1});
if(!tag){
filtered=posts;
if(tagTitle)tagTitle.textContent="Todas as postagens";
}
if(filtered.length===0){
tagPosts.innerHTML='<p style="color:var(--text-muted);">Nenhuma postagem encontrada para esta tag.</p>';
return;
}
var html="";
filtered.forEach(function(p){
html+='<article class="post-card">';
html+='<a href="'+p.url+'"><img src="../'+p.thumb+'" class="post-card-image" alt="'+p.title+'"></a>';
html+='<div class="post-card-content">';
html+='<div class="post-card-source"><span class="post-card-source-icon">IN</span>ieso nagata</div>';
html+='<h3 class="post-card-title"><a href="'+p.url+'">'+p.title+'</a></h3>';
html+='<div class="post-card-meta"><span class="post-date">'+p.date.split("-").reverse().join("/")+'</span></div>';
html+='</div></article>';
});
tagPosts.innerHTML=html;
})
.catch(function(){
tagPosts.innerHTML='<p style="color:var(--text-muted);">Erro ao carregar postagens.</p>';
});
})();
</script>
<script src="../js/sidebar.js?v=2"></script>
</body>
</html>
