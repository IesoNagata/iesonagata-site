<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="content/themes/google/favicon.png" sizes="32x32">
    <title>Ieso Nagata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="page" class="site">
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="header-logo">
                <div class="header-logo-icon">IN</div>
                <span class="site-title">Ieso Nagata</span>
            </a>
            <div class="search-box">
                <form role="search" method="get" action="/">
                    <span class="search-icon">&#128269;</span>
                    <input type="search" name="s" placeholder="Pesquisar por ..." value="">
                </form>
            </div>
            <nav class="main-navigation">
                <ul>
                    <li><a href="/">Início</a></li>
                    <li><a href="/about/">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">

        <div class="sidebar sidebar-left" id="sidebar-left"></div>

        <div class="main-content" id="main-posts">
            <p style="color:var(--text-muted);padding:2rem">Carregando postagens...</p>
        </div>

        <div class="sidebar sidebar-right" id="sidebar-right"></div>

    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; 2026 Ieso Nagata. Todos os direitos reservados.</p>
        </div>
    </footer>
</div>

<script src="js/sidebar.js?v=4"></script>
<script>
(function(){
fetch("js/posts.json")
.then(function(r){return r.json()})
.then(function(posts){
var box=document.getElementById("main-posts");
if(!box||!posts.length)return;
var h="";
var fmtDate=function(d){return d.split("-").reverse().join("/")};
var fixUrl=function(u){
if(!u)return"";
if(u.indexOf("http")===0)return u;
return"/"+u.replace(/^\//,"");
};
var first=posts[0];
h+='<div class="hero">';
h+='<a href="'+first.url+'"><img src="'+fixUrl(first.thumb)+'" alt="'+first.title+'"></a>';
h+='<span class="hero-label">Destaque</span>';
h+='<div class="hero-content">';
h+='<h1 class="hero-title"><a href="'+first.url+'">'+first.title+'</a></h1>';
h+='<div class="hero-meta"><span class="post-source"><span class="post-source-icon">IN</span>ieso nagata</span><span class="dot"></span><span class="post-date">'+fmtDate(first.date)+'</span></div>';
h+='</div></div>';
h+='<h2 class="section-title">Ultimas Noticias</h2>';
h+='<div class="posts-grid">';
posts.forEach(function(p){
h+='<article class="post-card">';
if(p.thumb)h+='<a href="'+p.url+'"><img src="'+fixUrl(p.thumb)+'" class="post-card-image" alt="'+p.title+'"></a>';
h+='<div class="post-card-content">';
h+='<div class="post-card-source"><span class="post-card-source-icon">IN</span>ieso nagata</div>';
h+='<h3 class="post-card-title"><a href="'+p.url+'">'+p.title+'</a></h3>';
h+='<div class="post-card-meta"><span class="post-date">'+fmtDate(p.date)+'</span></div>';
h+='</div></article>';
});
h+='</div>';
box.innerHTML=h;
});
})();
</script>
</body>
</html>
