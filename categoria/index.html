<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4111535989023878" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="../content/themes/google/favicon.png" sizes="32x32">
    <title>Categoria - Ieso Nagata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="page" class="site">
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="header-logo">
                <div class="header-logo-icon">IN</div>
                <span class="site-title">Ieso Nagata</span>
            </a>
            <div class="search-box">
                <form role="search" method="get" action="/">
                    <span class="search-icon">&#128269;</span>
                    <input type="search" name="s" placeholder="Pesquisar por ..." value="">
                </form>
            </div>
            <nav class="main-navigation">
                <ul>
                    <li><a href="/">Início</a></li>
                    <li><a href="/about/">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="sidebar sidebar-left" id="sidebar-left"></div>

        <div class="main-content" id="main-posts">
            <h2 class="section-title" id="cat-title">Categoria</h2>
            <div class="posts-grid" id="cat-posts">
                <p style="color:var(--text-muted);padding:2rem">Carregando postagens...</p>
            </div>
        </div>

        <div class="sidebar sidebar-right" id="sidebar-right"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; 2026 Ieso Nagata. Todos os direitos reservados.</p>
        </div>
    </footer>
</div>

<script src="../js/sidebar.js?v=18"></script>
<script>
(function(){
var params=new URLSearchParams(location.search);
var cat=params.get("cat")||"";
var catTitle=document.getElementById("cat-title");
var catPosts=document.getElementById("cat-posts");
if(catTitle)catTitle.textContent=cat;
fetch("../js/posts.json")
.then(function(r){return r.json()})
.then(function(posts){
var filtered=posts.filter(function(p){return (p.categoria||"Sem categoria")===cat});
if(!cat){
    filtered=posts;
    if(catTitle)catTitle.textContent="Todas as postagens";
}
if(!filtered.length){
    catPosts.innerHTML='<p style="color:var(--text-muted);">Nenhuma postagem nesta categoria.</p>';
    return;
}
var html="";
var fmtDate=function(d){return d.split("-").reverse().join("/")};
var baseUrl=location.pathname.replace(/\/[^\/]*$/,"");
var postUrl=function(url){
    if(!url)return"#";
    if(url.indexOf("http")===0)return url;
    return baseUrl+"/post.html?url="+encodeURIComponent(url);
};
var fixUrl=function(u){
    if(!u)return"";
    if(u.indexOf("http")===0)return u;
    return"/"+u.replace(/^\//,"");
};
filtered.forEach(function(p){
    html+='<article class="post-card">';
    if(p.thumb)html+='<a href="'+postUrl(p.url)+'"><img src="'+fixUrl(p.thumb)+'" class="post-card-image" alt="'+p.title+'"></a>';
    html+='<div class="post-card-content">';
    html+='<div class="post-card-source"><span class="post-card-source-icon">IN</span>ieso nagata</div>';
    html+='<h3 class="post-card-title"><a href="'+postUrl(p.url)+'">'+p.title+'</a></h3>';
    html+='<div class="post-card-meta"><span class="post-date">'+fmtDate(p.date)+'</span></div>';
    html+='</div></article>';
});
catPosts.innerHTML=html;
if(window.populateSidebarPosts)window.populateSidebarPosts(posts);
})
.catch(function(){
    catPosts.innerHTML='<p style="color:var(--text-muted);">Erro ao carregar postagens.</p>';
});
})();
</script>
</body>
</html>
