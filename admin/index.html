<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Ieso Nagata</title>
    <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2rem;width:400px}
    .login-box h2{margin-bottom:1rem;color:#f0f6fc}
    .login-box input{width:100%;padding:.75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:.9rem;margin-bottom:1rem}
    .login-box input:focus{outline:none;border-color:#58a6ff}
    .btn{padding:.6rem 1.2rem;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:500;text-decoration:none;display:inline-block}
    .btn-primary{background:linear-gradient(135deg,#58a6ff,#1f6feb);color:#fff}
    .btn-danger{background:#da3633;color:#fff}
    .btn-secondary{background:#21262d;color:#e6edf3;border:1px solid #30363d}
    .btn:hover{opacity:.9}
    .admin{display:none}
    .admin-header{background:#161b22;border-bottom:1px solid #30363d;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
    .admin-header h1{font-size:1.1rem;color:#f0f6fc}
    .admin-header .actions{display:flex;gap:.5rem;flex-wrap:wrap}
    .admin-container{max-width:960px;margin:2rem auto;padding:0 1rem}
    .post-list{margin-bottom:2rem}
    .post-item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
    .post-item .info{flex:1}
    .post-item .title{color:#f0f6fc;font-size:.9rem}
    .post-item .date{color:#8b949e;font-size:.75rem}
    .post-item .actions{display:flex;gap:.5rem}
    .editor{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:1.5rem}
    .editor h2{margin-bottom:1rem;color:#f0f6fc}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;color:#8b949e;font-size:.8rem;margin-bottom:.3rem;text-transform:uppercase}
    .form-group input,.form-group select{width:100%;padding:.75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:.9rem;font-family:inherit}
    .form-group input:focus{outline:none;border-color:#58a6ff}
    .form-row{display:flex;gap:1rem}
    .form-row .form-group{flex:1}
    .tag-input{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem}
    .tag-input .tag{background:#1f6feb;color:#fff;padding:.2rem .6rem;border-radius:12px;font-size:.75rem}
    .editor-actions{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
    .status{position:fixed;bottom:1rem;right:1rem;padding:.75rem 1.25rem;border-radius:8px;font-size:.85rem;display:none;z-index:100;max-width:400px}
    .status.success{display:block;background:#238636;color:#fff}
    .status.error{display:block;background:#da3633;color:#fff}
    .status.loading{display:block;background:#1f6feb;color:#fff}
    .tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #30363d}
    .tab{padding:.75rem 1.25rem;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;font-size:.85rem}
    .tab.active{color:#f0f6fc;border-bottom-color:#58a6ff}
    .tab:hover{color:#e6edf3}
    .panel{display:none}
    .panel.active{display:block}
    .help{color:#8b949e;font-size:.75rem;margin-top:.25rem}
    .toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:.5rem;background:#21262d;border:1px solid #30363d;border-bottom:none;border-radius:6px 6px 0 0}
    .toolbar button{background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;padding:.4rem .7rem;cursor:pointer;font-size:.8rem;min-width:32px}
    .toolbar button:hover{background:#30363d}
    .toolbar select{background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;padding:.3rem .5rem;font-size:.8rem;cursor:pointer}
    .toolbar .sep{width:1px;background:#30363d;margin:0 .25rem}
    .rte{min-height:350px;padding:1rem;background:#0d1117;border:1px solid #30363d;border-radius:0 0 6px 6px;color:#e6edf3;font-size:.95rem;line-height:1.7;outline:none;overflow-y:auto}
    .rte:focus{border-color:#58a6ff}
    .rte h1,.rte h2,.rte h3{color:#f0f6fc;margin:.5rem 0}
    .rte p{margin:.5rem 0}
    .rte a{color:#58a6ff}
    .rte img{max-width:100%;border-radius:8px;margin:.5rem 0}
    .rte blockquote{border-left:3px solid #58a6ff;padding-left:1rem;color:#8b949e;margin:.5rem 0}
    .rte pre{background:#21262d;padding:1rem;border-radius:6px;overflow-x:auto;margin:.5rem 0}
    .rte code{background:#21262d;padding:.1rem .3rem;border-radius:3px;font-size:.85em}
    .rte pre code{background:none;padding:0}
    .rte ul,.rte ol{margin:.5rem 0 .5rem 1.5rem}
    .rte hr{border:none;border-top:1px solid #30363d;margin:1rem 0}
    .link-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
    .link-modal.show{display:flex}
    .link-modal-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:1.5rem;width:420px}
    .link-modal-box h3{margin-bottom:1rem;color:#f0f6fc}
    .link-modal-box input{width:100%;padding:.75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:.9rem;margin-bottom:.5rem}
    .link-modal-box input:focus{outline:none;border-color:#58a6ff}
    .link-modal-box .actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.75rem}
    .thumb-row{display:flex;gap:.5rem;align-items:flex-end}
    .thumb-row input{flex:1}
    .thumb-row label.btn{margin-bottom:0;white-space:nowrap}
    .thumb-row input[type=file]{display:none}
    .thumb-preview{margin-top:.5rem}
    .thumb-preview img{max-width:200px;max-height:120px;border-radius:6px;border:1px solid #30363d}
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h2>&#128274; Admin Login</h2>
        <p style="color:#8b949e;font-size:.85rem;margin-bottom:1rem">Insira seu GitHub Personal Access Token (PAT) com permissao <strong>repo</strong>.</p>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" onkeydown="if(event.key==='Enter')login()">
        <button class="btn btn-primary" onclick="login()" style="width:100%">Entrar</button>
        <p class="help" style="margin-top:1rem">Gerar token em: GitHub Settings &gt; Developer Settings &gt; Personal Access Tokens</p>
    </div>
</div>

<div id="adminScreen" class="admin">
    <div class="admin-header">
        <h1>&#128221; Ieso Nagata - Admin</h1>
        <div class="actions">
            <button class="btn btn-secondary" onclick="showEditor()">+ Nova Postagem</button>
            <a href="/" target="_blank" class="btn btn-secondary">Ver Site</a>
            <button class="btn btn-secondary" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="admin-container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('posts')">Postagens</div>
            <div class="tab" onclick="switchTab('editor')">Editor</div>
        </div>

        <div id="panel-posts" class="panel active">
            <div id="postList" class="post-list">Carregando...</div>
        </div>

        <div id="panel-editor" class="panel">
            <div class="editor">
                <h2 id="editorTitle">Nova Postagem</h2>
                <input type="hidden" id="editSlug" value="">
                <input type="hidden" id="editThumbSha" value="">
                <div class="form-group">
                    <label>Titulo</label>
                    <input type="text" id="postTitle" placeholder="Titulo da postagem">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="postDate">
                    </div>
                    <div class="form-group">
                        <label>Tags (separadas por virgula)</label>
                        <input type="text" id="postTags" placeholder="arma reforger, games, linux">
                        <div id="tagPreview" class="tag-input"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Thumbnail</label>
                    <div class="thumb-row">
                        <input type="text" id="postThumb" placeholder="URL da imagem ou envie um arquivo">
                        <label class="btn btn-secondary" for="thumbFile">Enviar Imagem</label>
                        <input type="file" id="thumbFile" accept="image/*" onchange="uploadThumb(this)">
                    </div>
                    <div id="thumbPreview" class="thumb-preview"></div>
                </div>
                <div class="form-group">
                    <label>Conteudo</label>
                    <div class="toolbar">
                        <select onchange="execFormat(this.value);this.selectedIndex=0" title="Formato">
                            <option value="">Formato</option>
                            <option value="p">Paragrafo</option>
                            <option value="h1">Titulo H1</option>
                            <option value="h2">Titulo H2</option>
                            <option value="h3">Titulo H3</option>
                        </select>
                        <div class="sep"></div>
                        <button onclick="execCmd('bold')" title="Negrito"><b>B</b></button>
                        <button onclick="execCmd('italic')" title="Italico"><i>I</i></button>
                        <button onclick="execCmd('underline')" title="Sublinhado"><u>U</u></button>
                        <button onclick="execCmd('strikeThrough')" title="Riscado"><s>S</s></button>
                        <div class="sep"></div>
                        <button onclick="execCmd('insertUnorderedList')" title="Lista">&#8226; Lista</button>
                        <button onclick="execCmd('insertOrderedList')" title="Lista numerada">1. Lista</button>
                        <div class="sep"></div>
                        <button onclick="showLinkModal()" title="Link">&#128279;</button>
                        <button onclick="insertImage()" title="Imagem">&#128247;</button>
                        <button onclick="execCmd('insertHorizontalRule')" title="Linha horizontal">&#8213;</button>
                        <div class="sep"></div>
                        <button onclick="execCmd('formatBlock','blockquote')" title="Citacao">&#10077;</button>
                        <button onclick="insertCode()" title="Codigo">&#60;/&#62;</button>
                        <div class="sep"></div>
                        <button onclick="execCmd('undo')" title="Desfazer">&#8617;</button>
                        <button onclick="execCmd('redo')" title="Refazer">&#8618;</button>
                    </div>
                    <div id="rte" class="rte" contenteditable="true"><p>Escreva seu conteudo aqui...</p></div>
                </div>
                <div class="editor-actions">
                    <button class="btn btn-primary" onclick="savePost()">&#128190; Publicar</button>
                    <button class="btn btn-secondary" onclick="clearEditor()">Limpar</button>
                    <button class="btn btn-secondary" onclick="switchTab('posts')">Cancelar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="linkModal" class="link-modal">
    <div class="link-modal-box">
        <h3>Inserir Link</h3>
        <input type="text" id="linkUrl" placeholder="https://exemplo.com">
        <input type="text" id="linkText" placeholder="Texto do link (opcional)">
        <div class="actions">
            <button class="btn btn-secondary" onclick="closeLinkModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="insertLink()">Inserir</button>
        </div>
    </div>
</div>

<div id="statusBar" class="status"></div>

<script>
var TOKEN="",REPO="IesoNagata/iesonagata-site",BRANCH="master",posts=[],savedSelection=null;

function apiUrl(path){return "https://api.github.com/repos/"+REPO+"/contents/"+path.replace(/^\//,"")}

function login(){
    TOKEN=document.getElementById("tokenInput").value.trim();
    if(!TOKEN)return showStatus("Insira o token","error");
    localStorage.setItem("gh_token",TOKEN);
    showStatus("Autenticando...","loading");
    fetch(apiUrl(""),{headers:hdr()})
    .then(function(r){if(!r.ok)throw new Error("Token invalido");return r.json()})
    .then(function(){document.getElementById("loginScreen").style.display="none";document.getElementById("adminScreen").style.display="block";loadPosts();showStatus("Conectado","success")})
    .catch(function(e){showStatus("Erro: "+e.message,"error")});
}

function logout(){localStorage.removeItem("gh_token");TOKEN="";location.reload()}

function hdr(){return{Authorization:"Bearer "+TOKEN,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"}}

function loadPosts(){
    fetch(apiUrl("js/posts.json")+"?ref="+BRANCH,{headers:hdr()})
    .then(function(r){if(!r.ok)throw new Error("Erro ao carregar");return r.json()})
    .then(function(d){posts=JSON.parse(decodeURIComponent(escape(atob(d.content))));renderPosts()})
    .catch(function(e){document.getElementById("postList").innerHTML="<p style='color:#da3633'>Erro ao carregar postagens: "+e.message+"</p>"});
}

function renderPosts(){
    var h="";
    posts.forEach(function(p,i){
        h+='<div class="post-item"><div class="info"><div class="title">'+p.title+'</div><div class="date">'+p.date+'</div></div><div class="actions"><button class="btn btn-secondary" onclick="editPost('+i+')">Editar</button><button class="btn btn-danger" onclick="deletePost('+i+')">Excluir</button></div></div>';
    });
    document.getElementById("postList").innerHTML=h||"<p>Nenhuma postagem.</p>";
}

function showEditor(){switchTab("editor");clearEditor()}

function getFile(path){
    return fetch(apiUrl(path)+"?ref="+BRANCH,{headers:hdr()})
    .then(function(r){if(!r.ok)return null;return r.json()})
}

function putFile(path,content,sha,message){
    var body={message:message,content:btoa(unescape(encodeURIComponent(content))),branch:BRANCH};
    if(sha)body.sha=sha;
    return fetch(apiUrl(path),{method:"PUT",headers:hdr(),body:JSON.stringify(body)})
    .then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.message||"Erro API")}).catch(function(){return r.text().then(function(t){throw new Error("Erro ao salvar")})});return r.json()})
}

function deleteFile(path,sha,message){
    return fetch(apiUrl(path),{method:"DELETE",headers:hdr(),body:JSON.stringify({message:message,sha:sha,branch:BRANCH})})
    .then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.message||"Erro API")}).catch(function(){throw new Error("Erro ao deletar")});return r.json()})
}

function editPost(i){
    var p=posts[i];
    switchTab("editor");
    document.getElementById("editSlug").value=p.slug;
    document.getElementById("postTitle").value=p.title;
    document.getElementById("postDate").value=p.date;
    document.getElementById("postThumb").value=p.thumb||"";
    document.getElementById("postTags").value=(p.tags||[]).join(", ");
    document.getElementById("editorTitle").textContent="Editar: "+p.title;
    document.getElementById("rte").innerHTML="<p>Carregando...</p>";
    updateTagPreview();
    updateThumbPreview();

    var postPath=p.date.replace(/-/g,"/")+"/"+p.slug+"/index.html";
    getFile(postPath).then(function(d){
        if(!d){document.getElementById("rte").innerHTML="<p>Conteudo nao encontrado</p>";return}
        var full=decodeURIComponent(escape(atob(d.content)));
        var m=full.match(/<div class="entry-content">\s*([\s\S]*?)\s*<\/div>/);
        document.getElementById("rte").innerHTML=m?m[1]:"<p>Conteudo nao encontrado</p>";
    }).catch(function(e){showStatus("Erro ao carregar: "+e.message,"error")});
}

function clearEditor(){
    document.getElementById("editSlug").value="";
    document.getElementById("editThumbSha").value="";
    document.getElementById("postTitle").value="";
    document.getElementById("postDate").value=new Date().toISOString().slice(0,10);
    document.getElementById("postThumb").value="";
    document.getElementById("postTags").value="";
    document.getElementById("rte").innerHTML="<p>Escreva seu conteudo aqui...</p>";
    document.getElementById("editorTitle").textContent="Nova Postagem";
    document.getElementById("tagPreview").innerHTML="";
    document.getElementById("thumbPreview").innerHTML="";
}

function updateTagPreview(){
    var tags=document.getElementById("postTags").value.split(",").map(function(t){return t.trim()}).filter(Boolean);
    var h="";tags.forEach(function(t){h+='<span class="tag">'+t+"</span> "});
    document.getElementById("tagPreview").innerHTML=h;
}

function updateThumbPreview(){
    var url=document.getElementById("postThumb").value.trim();
    var div=document.getElementById("thumbPreview");
    div.innerHTML=url?'<img src="'+url+'" onerror="this.style.display=\'none\'">':"";
}

document.getElementById("postTags").addEventListener("input",updateTagPreview);
document.getElementById("postThumb").addEventListener("input",updateThumbPreview);

function uploadThumb(input){
    var file=input.files[0];
    if(!file)return;
    if(file.size>5*1024*1024){showStatus("Imagem muito grande (max 5MB)","error");return}
    showStatus("Enviando imagem...","loading");
    var reader=new FileReader();
    reader.onload=function(){
        var base64=reader.result.split(",")[1];
        var date=document.getElementById("postDate").value||new Date().toISOString().slice(0,10);
        var ext=file.name.split(".").pop().toLowerCase();
        var name=Date.now()+"."+ext;
        var path="content/uploads/"+date.replace(/-/g,"/")+"/"+name;
        var body={message:"Upload: "+name,content:base64,branch:BRANCH};
        fetch(apiUrl(path),{method:"PUT",headers:hdr(),body:JSON.stringify(body)})
        .then(function(r){if(!r.ok)throw new Error("Falha no upload (HTTP "+r.status+")");return r.json()})
        .then(function(){
            var url="https://raw.githubusercontent.com/"+REPO+"/"+BRANCH+"/"+path;
            document.getElementById("postThumb").value=url;
            updateThumbPreview();
            showStatus("Imagem enviada!","success");
        })
        .catch(function(e){showStatus("Erro: "+e.message,"error")});
    };
    reader.readAsDataURL(file);
}

function slugify(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}

function makePostHTML(title,date,content,tags){
    var tagHTML=tags.length?'<div class="post-tags">'+tags.map(function(t){return'<span class="post-tag">'+t+'</span>'}).join("")+'</div>':'<div class="post-tags"></div>';
    return'<!DOCTYPE html>\n<html lang="pt-BR">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1">\n<link rel="icon" type="image/png" href="../../../../content/themes/google/favicon.png" sizes="32x32">\n<link rel="preconnect" href="https://fonts.googleapis.com">\n<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>\n<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">\n<link rel="stylesheet" href="../../../../css/style.css">\n<title>'+title+' - Ieso Nagata</title>\n</head>\n<body>\n<div id="page" class="site">\n<header class="site-header"><div class="header-inner"><a href="/" class="header-logo"><div class="header-logo-icon">IN</div><span class="site-title">Ieso Nagata</span></a><div class="search-box"><form role="search" method="get" action="/"><span class="search-icon">&#128269;</span><input type="search" name="s" placeholder="Pesquisar por ..."></form></div><nav class="main-navigation"><ul><li><a href="/">Início</a></li><li><a href="/about/">Sobre</a></li></ul></nav></div></header>\n<main class="site-main">\n<div class="sidebar sidebar-left" id="sidebar-left"></div>\n<div class="main-content single-post"><article class="post-card"><div class="post-card-content"><div class="post-card-meta"><span class="post-card-source"><span class="post-card-source-icon">IN</span>ieso nagata</span><span class="dot"></span><span class="post-date">'+date.split("-").reverse().join("/")+'</span></div><h1 class="post-card-title">'+title+'</h1><div class="entry-content">\n'+content+'\n</div>'+tagHTML+'</div></article><nav class="post-navigation"><div class="nav-links"><a href="/" rel="prev">&laquo; Voltar</a></div></nav></div>\n<div class="sidebar sidebar-right" id="sidebar-right"></div>\n</main>\n<footer class="site-footer"><div class="footer-inner"><p>&copy; 2026 Ieso Nagata. Todos os direitos reservados.</p></div></footer>\n</div>\n<script src="../../../../js/sidebar.js"><\/script>\n</body>\n</html>';
}

function savePost(){
    var title=document.getElementById("postTitle").value.trim();
    var date=document.getElementById("postDate").value;
    var thumb=document.getElementById("postThumb").value.trim();
    var tags=document.getElementById("postTags").value.split(",").map(function(t){return t.trim()}).filter(Boolean);
    var content=document.getElementById("rte").innerHTML;
    var slug=document.getElementById("editSlug").value||slugify(title);
    if(!title){showStatus("Titulo obrigatorio","error");return}
    if(!date){showStatus("Data obrigatoria","error");return}
    if(!slug){showStatus("Titulo invalido para slug","error");return}

    showStatus("Publicando...","loading");

    var postPath=date.replace(/-/g,"/")+"/"+slug+"/index.html";
    var html=makePostHTML(title,date,content,tags);

    getFile(postPath).then(function(existing){
        return putFile(postPath,html,existing?existing.sha:null,(existing?"Edit":"New")+": "+title);
    }).then(function(){
        var idx=posts.findIndex(function(p){return p.slug===slug});
        var entry={title:title,slug:slug,date:date,url:"/"+date.replace(/-/g,"/")+"/"+slug+"/",tags:tags,thumb:thumb};
        if(idx>=0)posts[idx]=entry;else posts.unshift(entry);
        return getFile("js/posts.json");
    }).then(function(d){
        if(!d)throw new Error("posts.json nao encontrado");
        return putFile("js/posts.json",JSON.stringify(posts),d.sha,"Update posts.json");
    }).then(function(){
        showStatus("Publicado com sucesso!","success");
        loadPosts();
        clearEditor();
        switchTab("posts");
    }).catch(function(e){showStatus("Erro: "+e.message,"error")});
}

function deletePost(i){
    var p=posts[i];
    if(!confirm("Excluir: "+p.title+"?"))return;
    showStatus("Excluindo...","loading");
    var postPath=p.date.replace(/-/g,"/")+"/"+p.slug+"/index.html";

    getFile(postPath).then(function(d){
        if(d)return deleteFile(postPath,d.sha,"Delete: "+p.title);
    }).then(function(){
        posts.splice(i,1);
        return getFile("js/posts.json");
    }).then(function(d){
        return putFile("js/posts.json",JSON.stringify(posts),d.sha,"Update posts.json");
    }).then(function(){
        showStatus("Excluido!","success");loadPosts();
    }).catch(function(e){showStatus("Erro: "+e.message,"error")});
}

function execCmd(cmd,val){document.execCommand(cmd,false,val||null);document.getElementById("rte").focus()}
function execFormat(tag){if(!tag)return;document.execCommand("formatBlock",false,tag);document.getElementById("rte").focus()}
function saveSelection(){var s=window.getSelection();if(s.rangeCount>0)savedSelection=s.getRangeAt(0).cloneRange()}
function restoreSelection(){if(savedSelection){var s=window.getSelection();s.removeAllRanges();s.addRange(savedSelection)}}
function showLinkModal(){saveSelection();document.getElementById("linkUrl").value="";document.getElementById("linkText").value="";document.getElementById("linkModal").classList.add("show");document.getElementById("linkUrl").focus()}
function closeLinkModal(){document.getElementById("linkModal").classList.remove("show")}
function insertLink(){var u=document.getElementById("linkUrl").value.trim(),t=document.getElementById("linkText").value.trim();if(!u)return;closeLinkModal();restoreSelection();if(t){document.execCommand("insertHTML",false,'<a href="'+u+'">'+t+"</a>")}else{document.execCommand("createLink",false,u)}document.getElementById("rte").focus()}
function insertImage(){var u=prompt("URL da imagem:");if(!u)return;document.execCommand("insertHTML",false,'<img src="'+u+'" alt="" style="max-width:100%;border-radius:8px">');document.getElementById("rte").focus()}
function insertCode(){var c=prompt("Codigo:");if(!c)return;document.execCommand("insertHTML",false,"<pre><code>"+c.replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</code></pre>");document.getElementById("rte").focus()}

document.getElementById("rte").addEventListener("paste",function(e){
    e.preventDefault();
    var t=(e.clipboardData||window.clipboardData).getData("text/html")||(e.clipboardData||window.clipboardData).getData("text/plain");
    if(t.indexOf("<")===-1)t=t.replace(/\n/g,"<br>");
    document.execCommand("insertHTML",false,t);
});

function switchTab(name){
    document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
    document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active")});
    document.querySelector('.tab:nth-child('+(name==="posts"?1:2)+')').classList.add("active");
    document.getElementById("panel-"+name).classList.add("active");
}

function showStatus(msg,type){
    var bar=document.getElementById("statusBar");
    bar.textContent=msg;bar.className="status "+type;
    if(type!=="loading")setTimeout(function(){bar.className="status"},4000);
}

if(localStorage.getItem("gh_token")){
    TOKEN=localStorage.getItem("gh_token");
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("adminScreen").style.display="block";
    loadPosts();
}
</script>
